<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrair Conteúdo do Iframe</title>
<script>
window.onload = function() {
    var iframe = document.getElementById('meuIframe');
    var conteudo = iframe.contentWindow.document.body.innerHTML;
    document.getElementById('conteudoIframe').innerHTML = conteudo;
};
</script>
</head>
<body>
<iframe id="meuIframe" src="https://plex.maxcine.top/public/random-movie"></iframe>
<div id="conteudoIframe"></div>
</body>
</html>
