<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrair conteúdo de uma tag pre de outro site</title>
<script>
window.onload = function() {
    var iframe = document.createElement('iframe');
    iframe.src = 'https://plex.maxcine.top/public/random-movie';
    iframe.style.display = 'none'; // Oculta o iframe

    iframe.onload = function() {
        // Extrai o conteúdo da tag <pre> dentro do iframe
        var conteudoPre = iframe.contentDocument.querySelector('pre').textContent;
        
        // Exibe o conteúdo na mesma página
        document.body.innerHTML += '<p>' + conteudoPre + '</p>';
        
        // Remove o iframe da página
        iframe.parentNode.removeChild(iframe);
    };

    // Adiciona o iframe à página
    document.body.appendChild(iframe);
};
</script>
</head>
<body>
</body>
</html>
