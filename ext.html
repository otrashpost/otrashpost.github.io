<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrair dados para JSON</title>
</head>
<body>
    <button onclick="extrairDados()">Extrair Dados</button>

    <script>
        function extrairDados() {
            // URL do link de onde você deseja extrair os dados
            var url = "https://plex.maxcine.top/public/random-movie";

            // Realizar uma solicitação HTTP (por exemplo, usando fetch) para obter os dados da URL
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // Salvar os dados em um arquivo JSON
                    var jsonData = JSON.stringify(data);

                    // Criar um objeto Blob para os dados JSON
                    var blob = new Blob([jsonData], { type: "application/json" });

                    // Criar um link para fazer o download do arquivo JSON
                    var downloadLink = document.createElement("a");
                    downloadLink.href = URL.createObjectURL(blob);
                    downloadLink.download = "dados.json";
                    downloadLink.click();
                })
                .catch(error => console.error("Erro ao extrair dados:", error));
        }
    </script>
</body>
</html>
