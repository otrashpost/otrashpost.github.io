<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrair Conteúdo do iFrame</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .iframe-container {
            width: 100%;
            height: 500px;
            overflow: hidden;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .content-container {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Extrair Conteúdo do iFrame</h1>

    <div class="iframe-container">
        <iframe id="external-iframe" src="https://playertv.net/e/?v=premiere" allow="encrypted-media" allowfullscreen </iframe>
    </div>

    <div class="content-container">
        <h2>Conteúdo extraído do iFrame:</h2>
        <div id="extracted-content"></div>
    </div>

    <script>
        // Espera que o iframe tenha carregado
        document.getElementById('external-iframe').addEventListener('load', function() {
            // Pega o conteúdo do iframe
            var iframeContent = this.contentWindow.document.body.innerHTML;
            
            // Exibe o conteúdo extraído na página
            document.getElementById('extracted-content').innerHTML = iframeContent;
        });
    </script>
</body>
</html>
