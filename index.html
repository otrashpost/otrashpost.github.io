<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSCO Gallery</title>
    <!-- Adicionando Swiper CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="profile">
                <img src="https://via.placeholder.com/50" alt="Profile Picture">
                <span class="profile-name">John Doe</span>
            </div>

        </div>
    </header>

    <main>
        <!-- Adicionando Swiper -->
        <div class="swiper-container gallery">
            <div class="swiper-wrapper">
                <div class="swiper-slide item">
                    <img src="https://via.placeholder.com/400x400" alt="Image 1">
                </div>
                <div class="swiper-slide item">
                    <img src="https://via.placeholder.com/400x400" alt="Image 2">
                </div>
                <div class="swiper-slide item">
                    <img src="https://via.placeholder.com/400x400" alt="Image 3">
                </div>
                <!-- Repita elementos .swiper-slide para mais imagens -->
            </div>
            <!-- Adicionando botões de navegação do Swiper -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </main>
  
   <main>
        <section class="gallery">
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 1">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 2">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 3">
            </div>
            <!-- Repeat similar div.item elements for more images -->
        </section>

  

    <!-- Adicionando Swiper JS -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <!-- Inicializando o Swiper -->
    <script>
        var swiper = new Swiper('.swiper-container', {
            slidesPerView: 'auto', // Mostra o número de slides que cabem na tela
            spaceBetween: 20, // Espaço entre os slides
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>
</body>
</html>
