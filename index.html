<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTRASHPOST</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        /* Estilos adicionais para melhorar a aparência das imagens */
        .item {
            margin-bottom: 20px;
            position: relative;
        }
        .item img {
            width: 100%;
            max-width: 100%;
            height: auto;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .item img:hover {
            transform: scale(1.1);
        }

        /* Estilos para o slideshow */
        .slideshow-container {
            max-width: 800px; /* Largura máxima desejada */
            margin: 0 auto; /* Centraliza na página */
            position: relative;
            overflow: hidden; /* Esconde partes das imagens que ultrapassam a largura */
            margin-bottom: 20px;
        }
        .mySlides {
            display: none;
            position: relative;
            border-radius: 10px; /* Cantos arredondados dos slides */
        }
        .mySlides img {
            width: 100%; /* Garante que a imagem no slideshow ocupe toda a largura do container */
            height: auto;
            border-radius: 10px; /* Cantos arredondados das imagens */
        }
        .slide-button {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            border-radius: 10px; /* Cantos arredondados do botão */
            cursor: pointer;
        }
        .slide-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="profile">
                <img src="https://i.pinimg.com/564x/fe/92/04/fe9204fdfd040aa7675f63b0f9a0dac4.jpg" alt="Profile Picture">
                <span class="profile-name">TaldoRafael</span>
            </div>
        </div>
    </header>

    <!-- Slideshow section -->
    <section class="slideshow-container">
        <div class="mySlides">
            <a href="https://example.com/page1" target="_blank">
                <img src="https://via.placeholder.com/800x400" style="width:100%">
            </a>
            <button class="slide-button" onclick="window.open('https://example.com/page1', '_blank')">Abrir Link 1</button>
        </div>

        <div class="mySlides">
            <a href="https://example.com/page2" target="_blank">
                <img src="https://via.placeholder.com/800x400" style="width:100%">
            </a>
            <button class="slide-button" onclick="window.open('https://example.com/page2', '_blank')">Abrir Link 2</button>
        </div>

        <div class="mySlides">
            <a href="https://example.com/page3" target="_blank">
                <img src="https://via.placeholder.com/800x400" style="width:100%">
            </a>
            <button class="slide-button" onclick="window.open('https://example.com/page3', '_blank')">Abrir Link 3</button>
        </div>

        <!-- Navigation buttons -->
        <div class="caption-container">
            <p id="caption"></p>
        </div>
    </section>

    <main>
        <section class="gallery">
            <div class="item">
                <a href="https://example.com/page1" target="_blank">
                    <img src="https://via.placeholder.com/400x400" alt="Image 1">
                </a>
            </div>
            <div class="item">
                <a href="https://example.com/page2" target="_blank">
                    <img src="https://via.placeholder.com/400x400" alt="Image 2">
                </a>
            </div>
            <div class="item">
                <a href="https://example.com/page3" target="_blank">
                    <img src="https://via.placeholder.com/400x400" alt="Image 3">
                </a>
            </div>
            <!-- Adicione mais div.item para mais imagens -->
        </section>
    </main>

    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        var slideIndex = 0;
        showSlides();

        function showSlides() {
            var slides = document.getElementsByClassName("mySlides");
            var captionText = document.getElementById("caption");

            for (var i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }

            slides[slideIndex - 1].style.display = "block";
            captionText.innerHTML = slideIndex + " / " + slides.length;
            setTimeout(showSlides, 2000); // Change image every 2 seconds
        }

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function openModal(imageUrl) {
            var modal = document.getElementById('myModal');
            var modalImg = document.getElementById('modalImage');

            modal.style.display = 'block';
            modalImg.src = imageUrl;
        }

        function closeModal() {
            var modal = document.getElementById('myModal');
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
