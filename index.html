<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTRASHPOST</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        /* Estilos adicionais para melhorar a aparência das imagens */
        .item {
            margin-bottom: 20px;
        }
        .item img {
            width: 100%;
            max-width: 100%;
            height: auto;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .item img:hover {
            transform: scale(1.1);
        }

        /* Estilos para o slideshow */
        .slideshow-container {
            max-width: 100%;
            position: relative;
            margin-bottom: 20px;
        }
        .mySlides {
            display: none;
        }
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            margin-top: -22px;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }
        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 1);
        }
        .caption-container {
            text-align: center;
            padding: 21px 10px;
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            position: relative;
            bottom: 75px;
            width: 100%;
        }
        .numbertext {
            color: #f2f2f2;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }
              .modal {
            display: none; /* Inicialmente oculto */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8); /* Fundo semi-transparente */
            z-index: 9999; /* Garante que o modal esteja acima de todo o conteúdo */
            overflow: auto; /* Permite rolar o conteúdo se necessário */
            padding: 20px;
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 80%;
            max-height: 80%;
        }
        .close {
            color: #fff;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="profile">
                <img src="https://i.pinimg.com/564x/fe/92/04/fe9204fdfd040aa7675f63b0f9a0dac4.jpg" alt="Profile Picture">
                <span class="profile-name">TaldoRafael</span>
            </div>
        </div>
    </header>

    <!-- Slideshow section -->
    <section class="slideshow-container">
        <div class="mySlides">
            <img src="https://via.placeholder.com/800x400" style="width:100%">
        </div>

        <div class="mySlides">
            <img src="https://via.placeholder.com/800x400" style="width:100%">
        </div>

        <div class="mySlides">
            <img src="https://via.placeholder.com/800x400" style="width:100%">
        </div>

        <!-- Navigation buttons -->
        <div class="caption-container">
            <p id="caption"></p>
        </div>
    </section>

    <main>
        <section class="gallery">
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 1" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 2" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 3" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <!-- Adicione mais div.item para mais imagens -->
        </section>
      
              <section class="gallery">
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 1" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 2" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/400x400" alt="Image 3" onclick="openModal('https://via.placeholder.com/400x400')">
            </div>
            <!-- Adicione mais div.item para mais imagens -->
        </section>
      
    </main>

    <script>
        var slideIndex = 0;
        showSlides();

        function showSlides() {
            var slides = document.getElementsByClassName("mySlides");
            var captionText = document.getElementById("caption");

            for (var i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }

            slides[slideIndex - 1].style.display = "block";
            captionText.innerHTML = slideIndex + " / " + slides.length;
            setTimeout(showSlides, 2000); // Change image every 2 seconds
        }

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }
    </script>
  
  <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function openModal(imageUrl) {
            var modal = document.getElementById('myModal');
            var modalImg = document.getElementById('modalImage');

            modal.style.display = 'block';
            modalImg.src = imageUrl;
        }

        function closeModal() {
            var modal = document.getElementById('myModal');
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
