<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprodução de Stream HLS</title>
    <!-- Incluir estilos CSS (opcional) -->
    <link rel="stylesheet" href="https://otrashpost.github.io/public/css/stylers.css">
</head>
<body>
    <div class="video-container">
        <!-- Elemento de vídeo -->
        <video id="my-video" class="video-js" controls preload="auto" width="640" height="360">
            <!-- Fallback para navegadores que não suportam HLS -->
            <source src="https://mycdn.delivery/space/tracks-v1a1/mono.m3u8" type="application/x-mpegURL">
            Seu navegador não suporta a tag de vídeo ou a reprodução de HLS.
        </video>
    </div>

    <!-- Incluir script JavaScript -->
    <script src="https://otrashpost.github.io/public/js/scripts.js"></script>
</body>
</html>
