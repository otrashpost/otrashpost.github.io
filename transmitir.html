<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming HLS</title>
    <!-- Inclua os estilos e scripts necessários -->
    <link href="https://vjs.zencdn.net/7.14.3/video-js.css" rel="stylesheet">
   <link rel="stylesheet" href="/style.css">
    <script src="https://vjs.zencdn.net/7.14.3/video.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-hls/5.15.0/videojs-contrib-hls.min.js"></script>
</head>
<body>
    <!-- Elemento de vídeo -->
    <video id="my-video" class="video-js" controls preload="auto" width="640" height="264" data-setup="{}">
        <source src="https://mycdn.delivery/space/tracks-v1a1/mono.m3u8" type="application/x-mpegURL">
        <!-- Mensagem de fallback para navegadores que não suportam HLS -->
        Your browser does not support the video tag or HLS playback.
    </video>

    <script>
        // Configure o player de vídeo
        var player = videojs('my-video');
        player.play(); // Inicia a reprodução automaticamente
    </script>
</body>
</html>
