<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de iframe com captura automática de links</title>
</head>
<body>
    <div>
        <iframe id="iframe" width="800" height="600" src="" frameborder="0"></iframe>
    </div>
    <div id="linksContainer">
        <h2>Links na página:</h2>
        <ul id="linksList"></ul>
    </div>

    <script>
        var urls = [
            "https://sinalpublico.github.io/play/dtv?id=premiereclubes",
            "https://www.example2.com",
            "https://www.example3.com"
            // Adicione mais URLs conforme necessário
        ];

        var currentUrlIndex = 0;

        window.onload = function() {
            carregarProximaPagina();
        };

        function carregarProximaPagina() {
            if (currentUrlIndex < urls.length) {
                var iframe = document.getElementById("iframe");
                iframe.onload = function() {
                    capturarLinks();
                    setTimeout(carregarProximaPagina, 2000); // Aguarda 2 segundos antes de carregar a próxima página
                };
                iframe.src = urls[currentUrlIndex];
                currentUrlIndex++;
            }
        }

        function capturarLinks() {
            var iframe = document.getElementById("iframe");
            var iframeDocument = iframe.contentDocument || iframe.contentWindow.document;
            var links = iframeDocument.getElementsByTagName("a");
            var linksList = document.getElementById("linksList");

            for (var i = 0; i < links.length; i++) {
                var link = links[i].getAttribute("href");
                var listItem = document.createElement("li");
                var linkItem = document.createElement("a");
                linkItem.href = link;
                linkItem.textContent = link;
                listItem.appendChild(linkItem);
                linksList.appendChild(listItem);
            }
        }
    </script>
</body>
</html>
